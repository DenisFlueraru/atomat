<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ATOMAT LAB — Tools that listen</title>

<link href="https://api.fontshare.com/v2/css?f[]=neue-kaine@400,500,700&display=swap" rel="stylesheet">

<style>
:root{
  --rust:#cd6c27;
  --acid:#b6d228;
  --grey:#2f2f2f;
  --bg:#fefefe;
  --blue:#0000ff;
}

/* Reset */
*{ box-sizing:border-box; }
html,body{margin:0; background:var(--bg); color:var(--grey); font-family:'Neue Kaine',sans-serif;}

/* ================= HEADER ================= */
header{
  position:sticky;
  top:0;
  z-index:50;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(10px);
  border-bottom:1px solid #eee;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px 12px;
}
.nav{
  display:flex;
  gap:28px;
}
.nav a{
  text-decoration:none;
  color:var(--grey);
  font-weight:600;
  letter-spacing:0.6px;
  padding:8px 14px;
  border-radius:14px;
  transition: transform .25s ease, color .25s ease, background .25s ease;
}
.nav a:hover{
  transform:scale(1.08);
  color:var(--blue);
  background:rgba(110, 255, 20, 0.33);
}
.cart{
  margin-left:auto;
  font-size:22px;
  position:absolute;
  right:16px;
  top:16px;
}

/* ================= HERO ================= */
.hero{
  display:flex;
  justify-content:center;
  padding:24px 16px 32px;
  position:relative;
}
.hero-inner{
  position:relative;
  width:clamp(260px,70vw,800px);
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Rotating text */
.circle-svg{
  position:absolute;
  inset:0;
  animation:spin 40s linear infinite;
}
@keyframes spin{
  from{ transform:rotate(0deg);}
  to{ transform:rotate(360deg);}
}

/* Center image */
.center-image{
  width:clamp(140px,40vw,450px);
  aspect-ratio:1/1;
  border-radius:50%;
  overflow:hidden;
  box-shadow:0 40px 30px rgba(0,0,0,0.08);
  z-index:2;
}
.center-image img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.center-image::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, transparent 55%, white 92%);
}

/* ================= GLITCH ================= */
#glitch-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1000;
  overflow:hidden;
}
.glitch-text{
  position:absolute;
  font-weight:700;
  letter-spacing:0.6px;
  white-space:nowrap;
  opacity:0;
  filter:blur(0.3px);
  transition: opacity .18s ease, transform .18s ease;
}

/* ================= REVIEWS CAROUSEL ================= */
.reviews{
  background:#f5f5f5;
  color:#2f2f2f;
  padding:64px 16px 88px;
  text-align:center;
}
.reviews h2{
  color:var(--acid);
  letter-spacing:.6px;
  margin-bottom:48px;
  font-weight:700;
}
.carousel-container{
  position:relative;
  max-width:1000px;
  margin:0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.carousel{
  display:flex;
  transition: transform 0.6s ease;
}
.review-card{
  background:#fff;
  border-left:4px solid var(--acid);
  border-radius:4px;
  padding:24px;
  margin:0 12px;
  box-shadow:0 6px 16px rgba(0,0,0,0.05);
  min-width:250px;
  max-width:320px;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:left;
  font-size:14px;
  line-height:1.5;
  opacity:0.5;
  transform: scale(0.9);
  transition: all 0.6s ease;
}
.review-card.center{
  opacity:1;
  transform: scale(1);
}
@media(max-width:768px){
  .review-card{min-width:220px; max-width:260px; padding:18px;}
}

/* ================= FOOTER ================= */
footer{
  display:flex;
  flex-wrap:wrap;
  gap:32px;
  justify-content:center;
  align-items:center;
  padding:40px 16px 80px;
  border-top:1px solid #eee;
  text-align:center;
}
footer a{
  text-decoration:none;
  color:var(--grey);
  font-weight:600;
}
footer a:hover{ color:var(--blue); }

/* ================= ROTATING LOGO ================= */
#rotating-logo{
  position:fixed;
  left:14px;
  bottom:14px;
  width:110px;
  height:110px;
  object-fit:contain;
  animation:spinLogo 18s linear infinite;
}
@keyframes spinLogo{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<header>
  <nav class="nav">
    <a href="index.html">HOME</a>
    <a href="shop.html">SHOP</a>
    <a href="about.html">ABOUT</a>
    <a href="contact.html">CONTACT</a>
  </nav>
  <div class="cart" title="Cart">🛒</div>
</header>

<!-- GLITCH TEXT -->
<div id="glitch-layer"></div>

<main>
<section class="hero">
  <div class="hero-inner">
    <svg class="circle-svg" viewBox="0 0 100 100">
      <defs>
        <path id="circlePath" d="M50,20 a30,30 0 1,1 0,60 a30,30 0 1,1 0,-60"/>
      </defs>
      <text font-size="4" fill="#444">
        <textPath href="#circlePath">
          + devices built for sound explorers, artists, and those who listen +
        </textPath>
      </text>
    </svg>
    <a href="shop.html" class="center-image">
      <img src="https://lh3.googleusercontent.com/d/1q1S6hm7zgfIlNC0I8C70cXgxdg87aHK2" alt="Atomat Lab">
    </a>
  </div>
</section>

<section class="reviews">
  <h2>What people say</h2>
  <div class="carousel-container">
    <div class="carousel" id="carousel"></div>
  </div>
</section>
</main>

<footer>
  <div>
    © ATOMAT LAB — tools that listen<br>
    <a href="mailto:contact@atomatlab.com">contact@atomatlab.com</a>
  </div>
  <div>
    <a href="termsofservice.html">Terms of Service</a><br>
    <a href="privacypolicy.html">Privacy Policy</a><br>
    <a href="refundpolicy.html">Refunds Policy</a>
  </div>
</footer>

<img id="rotating-logo" src="https://lh3.googleusercontent.com/d/1Oz-mWMgJsv7vnKWHDUaHM4pgjF8NZavd" alt="AtomatLab logo">

<script>
// ================= REVIEWS CAROUSEL =================
const reviewsData = [
  "Excellent microphone and excellent service by Denis!",
  "Amazing mic, picks up loads of sounds",
  "Top class communication. Five stars.",
  "High quality, clear sound, reliable performance.",
  "User-friendly and very precise in capturing details.",
  "Perfect for artists exploring new sonic territories."
  // Add your 60 reviews here
];

const carousel = document.getElementById('carousel');

// Create cards
reviewsData.forEach((text)=> {
  const card = document.createElement('div');
  card.className='review-card';
  card.textContent=text;
  carousel.appendChild(card);
});

let currentIndex = 0;
const cards = document.querySelectorAll('.review-card');

function updateCarousel(){
  cards.forEach((c,i)=>{
    c.classList.remove('center');
    let pos = i - currentIndex;
    // Wrap-around
    if(pos < -Math.floor(cards.length/2)) pos += cards.length;
    if(pos > Math.floor(cards.length/2)) pos -= cards.length;

    if(pos===0) c.classList.add('center');
  });
  const offset = -currentIndex* (cards[0].offsetWidth + 24); // 24 = margin*2 + gap
  carousel.style.transform = `translateX(${offset + carousel.parentElement.offsetWidth/2 - cards[0].offsetWidth/2}px)`;
}

// Auto-swipe
setInterval(()=>{
  currentIndex = (currentIndex+1) % cards.length;
  updateCarousel();
},4000);

// Initial
window.addEventListener('load', updateCarousel);
window.addEventListener('resize', updateCarousel);

// ================= GLITCH SCRIPT =================
const glitchColors = ['#0000ff','#b6d228','#cd6c27','#2f2f2f'];
const glitchLayer = document.getElementById('glitch-layer');
const GLITCH_TEXT = 'tools that listen';

function spawnGlitch(){
  const count = Math.floor(Math.random()*4) + 3;
  for(let j=0;j<count;j++){
    setTimeout(()=>createGlitch(GLITCH_TEXT), j*28);
  }
  if(Math.random()>0.55){
    setTimeout(()=>createGlitch(GLITCH_TEXT), count*40);
  }
  setTimeout(spawnGlitch, Math.random()*4500 + 2500);
}

function createGlitch(text){
  const el = document.createElement('div');
  el.className='glitch-text';
  el.textContent = text;

  const color = glitchColors[Math.floor(Math.random()*glitchColors.length)];
  el.style.color = color;
  el.style.textShadow = `0 0 6px ${color}, 0 0 14px ${color}, 0 0 24px ${color}`;
  el.style.fontSize = `${Math.random()*18 + 18}px`;
  el.style.left = `${Math.random()*90}vw`;
  el.style.top = `${Math.random()*85}vh`;

  glitchLayer.appendChild(el);

  requestAnimationFrame(()=>{
    el.style.opacity = '1';
    el.style.transform = `translate(${Math.random()*20-10}px,${Math.random()*20-10}px) rotate(${Math.random()*8-4}deg)`;
  });

  setTimeout(()=>{
    el.style.opacity='0';
    setTimeout(()=>el.remove(),400);
  },220 + Math.random()*300);
}

spawnGlitch();
</script>
</body>
</html>
